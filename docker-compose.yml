services:
  mailo-forwarder:
    build: .
    container_name: mailo-forwarder
    restart: unless-stopped
    environment:
      - IMAP_USER=${IMAP_USER}
      - IMAP_PASS=${IMAP_PASS}
      - FORWARD_TO=${FORWARD_TO}
      - CHECK_INTERVAL=${CHECK_INTERVAL:-300}
      - SMTP_PORT=${SMTP_PORT:-465}
      - SMTP_TIMEOUT=${SMTP_TIMEOUT:-60}
      - SMTP_TLS_MODE=${SMTP_TLS_MODE:-auto}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - DELETE_AFTER_FORWARD=${DELETE_AFTER_FORWARD:-false}
    volumes:
      - ./logs:/app/logs
